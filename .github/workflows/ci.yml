name: Standard CI Pipeline

on:
  pull_request:
  push:

jobs:

  # =========================================
  # BUILD
  # =========================================
  build:
    name: Build
    runs-on: ubuntu-latest

    outputs:
      passed: ${{ steps.result.outputs.passed }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Placeholder
        run: echo "[BUILD] Not implemented"

      - name: Create Report Artifact
        run: |
          echo '{"job": "build", "status": "passed", "reports": [{"name": "General", "status": "passed", "comment": "Passed"}]}' > build-report.json

      - name: Upload Build Report
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: build-report.json

      - name: Set Build Result
        id: result
        run: echo "passed=true" >> $GITHUB_OUTPUT


  # =========================================
  # LINT
  # =========================================
  lint:
    name: Lint
    runs-on: ubuntu-latest

    outputs:
      passed: ${{ steps.result.outputs.passed }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Placeholder
        run: echo "[LINT] Not implemented"

      - name: Create Report Artifact
        run: |
          echo '{"job": "lint", "status": "passed", "reports": [{"name": "General", "status": "passed", "comment": "Passed"}]}' > lint-report.json

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint-report.json

      - name: Set Lint Result
        id: result
        run: echo "passed=true" >> $GITHUB_OUTPUT


  # =========================================
  # STATIC ANALYSIS
  # =========================================
  static:
    name: Static Analysis
    runs-on: ubuntu-latest

    outputs:
      passed: ${{ steps.result.outputs.passed }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Placeholder
        run: echo "[STATIC] Not implemented"

      - name: Create Report Artifact
        run: |
          echo '{"job": "static", "status": "passed", "reports": [{"name": "General", "status": "passed", "comment": "Passed"}]}' > static-report.json

      - name: Upload Static Report
        uses: actions/upload-artifact@v4
        with:
          name: static-report
          path: static-report.json

      - name: Set Static Result
        id: result
        run: echo "passed=true" >> $GITHUB_OUTPUT


  # =========================================
  # TEST
  # =========================================
  test:
    name: Test
    runs-on: ubuntu-latest

    outputs:
      passed: ${{ steps.result.outputs.passed }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Placeholder
        run: echo "[TEST] Not implemented"

      - name: Create Report Artifact
        run: |
          echo '{"job": "test", "status": "passed", "reports": [{"name": "General", "status": "passed", "comment": "Passed"}]}' > test-report.json

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.json

      - name: Set Test Result
        id: result
        run: echo "passed=true" >> $GITHUB_OUTPUT


  # =========================================
  # SECURITY
  # =========================================
  security:
    name: Security
    runs-on: ubuntu-latest

    outputs:
      passed: ${{ steps.result.outputs.passed }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Placeholder
        run: echo "[SECURITY] Not implemented"

      - name: Create Report Artifact
        run: |
          echo '{"job": "security", "status": "passed", "reports": [{"name": "General", "status": "passed", "comment": "Passed"}]}' > security-report.json

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.json

      - name: Set Security Result
        id: result
        run: echo "passed=true" >> $GITHUB_OUTPUT


  # =========================================
  # GOVERNANCE
  # =========================================
  governance:
    name: Governance
    runs-on: ubuntu-latest
    if: always()

    needs:
      - build
      - lint
      - static
      - test
      - security

    permissions:
      contents: write
      pull-requests: write
      issues: write

    outputs:
      allowed: ${{ steps.governance.outputs.allowed }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Run Governance Engine
        id: governance
        uses: Programming-Club-Curtin-Colombo/Governance@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          discord-webhook-url: ${{ secrets.DISCORD_AUDIT_WEBHOOK_URL }}
          governance-webhook-url: ${{ secrets.GOVERNANCE_WEBHOOK_URL }}

          build-status: ${{ needs.build.outputs.passed }}
          lint-status: ${{ needs.lint.outputs.passed }}
          static-status: ${{ needs.static.outputs.passed }}
          test-status: ${{ needs.test.outputs.passed }}
          security-status: ${{ needs.security.outputs.passed }}

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: ci-html-report
          path: ci-report.html


  # =========================================
  # ENFORCEMENT GATE
  # =========================================
  enforce:
    name: Enforce Governance
    runs-on: ubuntu-latest

    needs:
      - governance

    if: always()

    steps:
      - name: Validate Governance Result
        run: |
          if [ "${{ needs.governance.outputs.allowed }}" != "true" ]; then
            echo "[GOVERNANCE] BLOCKED"
            exit 1
          fi

          echo "[GOVERNANCE] PASSED"